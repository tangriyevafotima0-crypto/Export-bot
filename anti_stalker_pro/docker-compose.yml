version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anti-stalker-pro
    ports:
      - "5000:5000"
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
